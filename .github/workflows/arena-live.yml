name: Live arena referee (build + deploy)

# Builds the live game-server (referee) image and optionally deploys it to the
# shared Hetzner box (same pattern as the arena verify worker). The referee uses
# the referee-only manifest (deploy/lex.toml), so private deps resolve with the
# repo-scoped GITHUB_TOKEN — no extra secrets for the build itself.
on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to the VM after building"
        type: boolean
        default: true
  push:
    tags: ["arena-live-v*"]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/lex-arena-referee
  # Run on the ARM64 runner — the production box (Hetzner CAX) is aarch64.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push referee image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
  # A deploy job (ssh to the box, docker compose pull + up -d) mirrors
  # loom-cloud's release.yml — wire it in once the box secrets are available.
