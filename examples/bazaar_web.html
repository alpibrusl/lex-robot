<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Robot Bazaar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d1117;
  --bg2:    #161b22;
  --bg3:    #1c2128;
  --border: #30363d;
  --text:   #e6edf3;
  --muted:  #8b949e;
  --purple: #a78bfa;
  --green:  #4ade80;
  --amber:  #fbbf24;
  --red:    #f87171;
  --blue:   #60a5fa;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  height: 40px;
}
header h1 { font-size: 13px; color: var(--purple); letter-spacing: .1em; font-weight: bold; white-space: nowrap; }
#h-meta   { color: var(--muted); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#h-conn   { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); white-space: nowrap; }
#h-dot    { width: 8px; height: 8px; border-radius: 50%; background: #374151; flex-shrink: 0; }
#h-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
#h-dot.run  { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Controls ───────────────────────────────────────────────── */
#controls {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  height: 38px;
  border-bottom: 1px solid var(--border);
}
.ctrl-row:last-child { border-bottom: none; height: 32px; }
.ctrl-lbl { font-size: 9px; color: var(--muted); white-space: nowrap; letter-spacing: .08em; }
.ctrl-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
input.ctrl-in {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 7px;
  border-radius: 4px; outline: none; flex-shrink: 0;
}
input.ctrl-in:focus { border-color: var(--purple); }
#in-name  { width: 82px; }
#in-goal  { flex: 1; min-width: 120px; }
.toggle-wrap { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }
.toggle-wrap input[type=checkbox] { accent-color: var(--purple); cursor: pointer; }
.toggle-wrap .tl { font-size: 10px; color: var(--muted); }
.toggle-wrap:hover .tl { color: var(--text); }
.btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 10px;
  border-radius: 4px; cursor: pointer; white-space: nowrap; transition: border-color .15s, color .15s; flex-shrink: 0;
}
.btn:hover { border-color: var(--purple); color: var(--purple); }
.btn-reset { color: var(--muted); }
.btn-reset:hover { border-color: var(--red); color: var(--red); }
#ctrl-status { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; }
/* Sellers row */
.seller-check { display: flex; align-items: center; gap: 3px; cursor: pointer; user-select: none; }
.seller-check input { accent-color: var(--blue); cursor: pointer; }
.seller-check span { font-size: 9px; color: var(--muted); }
.seller-check:hover span { color: var(--text); }

/* ── Main: game column + right sidebar ────────────────────── */
#main {
  flex: 1; min-height: 0; display: flex; flex-direction: row; overflow: hidden;
}
#game-col {
  flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
}
#game-container {
  flex: 1; min-height: 0; overflow: hidden; background: var(--bg);
}
#game-container canvas { display: block; }

/* ── Right sidebar ────────────────────────────────────────── */
#right-sidebar {
  width: 320px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 1px;
  background: var(--border); border-left: 1px solid var(--border); overflow: hidden;
}
.panel {
  background: var(--bg); padding: 8px 10px; overflow: hidden;
  display: flex; flex-direction: column; gap: 5px; min-height: 0;
}
.panel-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted);
  border-bottom: 1px solid var(--border); padding-bottom: 4px; flex-shrink: 0;
}

/* Questions panel */
#questions-panel { flex-shrink: 0; border: 1px solid var(--amber); border-radius: 4px; margin: 4px; padding: 6px 8px; background: #1a1500; display: none; }
#questions-panel .panel-title { color: var(--amber); border-color: #44370066; }
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin-bottom: 5px; flex-shrink: 0; }
.q-robot { font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 8px; margin-bottom: 4px; display: inline-block; }
.q-text { font-size: 10px; color: var(--text); margin-bottom: 5px; word-break: break-word; }
.q-reply { display: flex; gap: 5px; }
.q-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 7px; border-radius: 4px; outline: none; }
.q-input:focus { border-color: var(--amber); }

/* Shopping list panel */
#shop-panel { flex-shrink: 0; }
#shop-list { display: flex; flex-direction: column; gap: 3px; }
.shop-item { font-size: 13px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
.shop-item.got { color: var(--green); }
.shop-item .dot { width: 12px; display: inline-block; }

/* Customers panel */
#customers-panel { flex-shrink: 0; max-height: 28%; }
#customers-list  { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
.cust-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  padding: 5px 8px; display: grid; grid-template-columns: 24px 1fr; gap: 6px; align-items: start; flex-shrink: 0;
}
.cust-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
.cust-name   { font-size: 11px; font-weight: bold; }
.cust-goal   { font-size: 9px; color: var(--muted); }
.cust-status { font-size: 10px; margin-top: 2px; word-break: break-word; }
.cust-status.idle      { color: var(--muted); }
.cust-status.shopping  { color: var(--amber); }
.cust-status.done-ok   { color: var(--green); }
.cust-status.done-fail { color: var(--red); }

/* Activity badges */
#activity-panel { flex-shrink: 0; }
#activity-list  { display: flex; flex-wrap: wrap; gap: 3px; max-height: 46px; overflow: hidden; }
.badge { font-size: 9px; padding: 2px 5px; border-radius: 9px; background: var(--bg3); border: 1px solid var(--border); white-space: nowrap; }
.badge.query    { color: var(--blue);   border-color: #1e40af66; }
.badge.reserve  { color: var(--amber);  border-color: #78350f66; }
.badge.complete { color: var(--green);  border-color: #15803d66; }
.badge.human    { color: var(--amber);  border-color: #92400e66; }

/* ── Log (now a tall side panel) ──────────────────────────── */
#log-section {
  flex: 1; min-height: 0; background: var(--bg);
  display: flex; flex-direction: column; overflow: hidden;
}
#log-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); padding: 6px 11px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#log     { overflow-y: auto; flex: 1; padding: 4px 11px; }
.ll      { font-size: 12px; color: var(--muted); white-space: nowrap; line-height: 1.7; }
.ll .ts  { color: #4a5568; margin-right: 7px; }
.ll .ev  { color: var(--purple); margin-right: 5px; }
.ll .cu  { font-weight: bold; margin-right: 4px; }
.ll .ok  { color: var(--green); }
.ll .er  { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>ROBOT BAZAAR</h1>
  <span id="h-meta">ready — configure below, then send a robot</span>
  <div id="h-conn"><div id="h-dot"></div><span id="h-status">connecting</span></div>
</header>

<div id="controls">
  <!-- Row 1: robot config -->
  <div class="ctrl-row">
    <span class="ctrl-lbl">NAME</span>
    <input id="in-name" class="ctrl-in" type="text" placeholder="Alice" value="Alice">
    <span class="ctrl-lbl">GOAL</span>
    <input id="in-goal" class="ctrl-in" type="text" placeholder="Find a Bowl for at most 15 credits" value="Find a Bowl for at most 15 credits">
    <div class="ctrl-sep"></div>
    <label class="toggle-wrap">
      <input type="checkbox" id="in-ask-human">
      <span class="tl">Ask Human</span>
    </label>
    <div class="ctrl-sep"></div>
    <button class="btn" onclick="sendRobot()">↗ Send Robot</button>
    <button class="btn btn-reset" onclick="resetMarket()">⟳ Reset</button>
    <span id="ctrl-status"></span>
  </div>
  <!-- Row 2: seller selection -->
  <div class="ctrl-row">
    <span class="ctrl-lbl">SELLERS</span>
    <label class="seller-check"><input type="checkbox" name="stall" value="pottery" checked><span>Pottery :8901</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="clay"    checked><span>Clay :8904</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="textile" checked><span>Textile :8902</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="fabric"  checked><span>Fabric :8905</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="spices"  checked><span>Spices :8903</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="herb"    checked><span>Herb :8906</span></label>
  </div>
</div>

<div id="main">
  <div id="game-col">
    <div id="game-container"></div>
  </div>

  <div id="right-sidebar">
    <!-- Questions from robots (shown only when pending) -->
    <div id="questions-panel">
      <div class="panel-title">⚠ Robot Questions</div>
      <div id="questions-list"></div>
    </div>

    <!-- Shopping list (ticked off as items are bought) -->
    <div class="panel" id="shop-panel">
      <div class="panel-title">Shopping List</div>
      <div id="shop-list"><span style="color:var(--muted);font-size:11px">—</span></div>
    </div>

    <!-- Customers -->
    <div class="panel" id="customers-panel">
      <div class="panel-title">Customers</div>
      <div id="customers-list">
        <span style="color:var(--muted);font-size:10px">No customers yet</span>
      </div>
    </div>

    <div class="panel" id="activity-panel">
      <div class="panel-title">Gemini Activity</div>
      <div id="activity-list"><span style="color:var(--muted);font-size:10px">No calls yet</span></div>
    </div>

    <!-- Event log — now a tall, readable side panel -->
    <div id="log-section">
      <div id="log-hdr">Event Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.70.0/phaser.min.js"></script>
<script src="/retro_kit.js"></script>
<script>
'use strict';

// ── Color palette ─────────────────────────────────────────────
const PALETTE = [
  { hex: '#fbbf24', phaser: 0xfbbf24, tc: '#000000' },
  { hex: '#60a5fa', phaser: 0x60a5fa, tc: '#ffffff' },
  { hex: '#4ade80', phaser: 0x4ade80, tc: '#000000' },
  { hex: '#f472b6', phaser: 0xf472b6, tc: '#000000' },
  { hex: '#fb923c', phaser: 0xfb923c, tc: '#000000' },
  { hex: '#22d3ee', phaser: 0x22d3ee, tc: '#000000' },
  { hex: '#c084fc', phaser: 0xc084fc, tc: '#000000' },
  { hex: '#f87171', phaser: 0xf87171, tc: '#ffffff' },
];
const customerColors = {};
let colorIdx = 0;

function getColor(name) {
  if (!customerColors[name]) {
    customerColors[name] = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;
  }
  return customerColors[name];
}
function resetColors() {
  Object.keys(customerColors).forEach(k => delete customerColors[k]);
  colorIdx = 0;
}

// ── Phaser scene ───────────────────────────────────────────────
let gameScene = null;
const eventQueue = [];

// Retro pixel fonts (loaded via Google Fonts <link> in <head>).
const PX  = 'VT323';            // readable retro terminal — labels & bubbles
const PXH = '"Press Start 2P"'; // chunky NES — headings & big callouts

// Monkey Island night-bazaar palette.
const SKY_TOP = 0x0f1f3d, SKY_BOT = 0x2d4a6b, MOON = 0xf5e6c8;
const GROUND  = 0x24343d, COBBLE = 0x2c4049, COBBLE_HI = 0x35505c, HORIZON = 0x16262e;
const WOOD    = 0x4a3322, WOOD_DK = 0x3a2718, WOOD_LT = 0x7a5230, POLE = 0x5a3a1f;
const CANVAS_CREAM = 0xe8d4a0, SKIN = 0xe0a878, SKIN_DK = 0xc88a5a;

// Agent metadata by physics key (positions come from the live `world` scan, not here).
const STALL_DEFS = [
  { name: 'Pottery Palace',  key: 'pottery', color: 0xc2410c, sub: 'Bowl 8 · Vase 12 · Teapot 22' },
  { name: 'Clay Corner',     key: 'clay',    color: 0xb45309, sub: 'Bowl 10 · Jug 7' },
  { name: 'Textile Traders', key: 'textile', color: 0x6d28d9, sub: 'Scarf 15 · Tablecloth 30' },
  { name: 'Spice Garden',    key: 'spices',  color: 0x15803d, sub: 'Saffron 5 · Vanilla 9 · Anise 4' },
  { name: 'Fabric House',    key: 'fabric',  color: 0x4338ca, sub: 'Scarf 12 · Ribbon 8' },
  { name: 'Herb Garden',     key: 'herb',    color: 0x065f46, sub: 'Saffron 6 · Lavender 3' },
];
const STALL_BY_KEY = {};
STALL_DEFS.forEach(d => { STALL_BY_KEY[d.key] = d; });

class BazaarScene extends Phaser.Scene {
  constructor() {
    super({ key: 'BazaarScene' });
    this.stalls = {};
    this.robots = {};
  }

  // ── colour helpers ───────────────────────────────────────────
  _shade(hex, f) {
    let r = (hex >> 16) & 255, g = (hex >> 8) & 255, b = hex & 255;
    r = Math.min(255, Math.round(r * f)); g = Math.min(255, Math.round(g * f)); b = Math.min(255, Math.round(b * f));
    return (r << 16) | (g << 8) | b;
  }
  _mix(a, b, t) {
    const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
    const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
    const r = Math.round(ar + (br - ar) * t), g = Math.round(ag + (bg - ag) * t), bl = Math.round(ab + (bb - ab) * t);
    return (r << 16) | (g << 8) | bl;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.ROBOT_R = 12;
    // Top-down map: physics metres → canvas pixels. Agents are placed from the
    // live `world` scan; the robot follows real `pos` updates. No fixed grid.
    this.STALL_SW = 104; this.STALL_SH = 64; this.STALL_AH = 16;
    this.worldS  = Math.min(W, H) * 0.085;   // px per metre
    this.worldCx = W * 0.5;
    this.worldCy = H * 0.46;
    this.entryX  = W * 0.5; this.exitX = W * 0.5;   // (legacy fields used by _onDone)

    this._drawBg(W, H);
    this.add.text(8, H - 16, 'top-down map · live physics positions', { fontFamily: PX, fontSize: '12px', color: '#3a5266' }).setDepth(2);

    // Place the real physics agents at their known world coordinates up-front so
    // the shops are always visible; the `world`/`pos` events then refine the
    // robot's live position. (Matches STALLS in gym_env/bazaar_env.py.)
    const PHYS = { pottery: { x: -3, y: 3 }, textile: { x: 3, y: 3 }, spices: { x: 0, y: -3 } };
    Object.keys(PHYS).forEach(key => this._placeStall(key, PHYS[key].x, PHYS[key].y));

    gameScene = this;
    while (eventQueue.length) this.handleEvent(eventQueue.shift());
  }

  // Draw a stall at a world coordinate (idempotent).
  _placeStall(key, wx, wy) {
    if (this.stalls[key]) return this.stalls[key];
    const c = this._w2c(wx, wy);
    const def = STALL_BY_KEY[key] || { name: key, color: 0x6d8c3a, sub: '' };
    this.stalls[key] = { cx: c.x, cy: c.y, color: def.color, SW: this.STALL_SW, SH: this.STALL_SH,
      ...this._makeStall(c.x, c.y, def.name, def.sub, def.color, this.STALL_SW, this.STALL_SH, this.STALL_AH) };
    return this.stalls[key];
  }

  // physics metres → canvas pixels (y up in world, down in canvas)
  _w2c(wx, wy) { return { x: this.worldCx + wx * this.worldS, y: this.worldCy - wy * this.worldS }; }

  // Lay out the agents at their REAL scanned positions and seat the robot at its
  // real position. Each agent's world coord = robot_pos + dist·(cos,sin bearing).
  _onWorld(scan) {
    if (!scan) return;
    const rp = scan.robot_pos || { x: 0, y: 0 };
    // Place any scanned agent we didn't already pre-seat (keeps map honest if the
    // physics layout changes). Pre-placed shops are skipped by _placeStall.
    (scan.stalls_visible || []).forEach(s => {
      const br = (s.bearing_deg || 0) * Math.PI / 180;
      this._placeStall(s.name, rp.x + (s.distance_m || 0) * Math.cos(br), rp.y + (s.distance_m || 0) * Math.sin(br));
    });
    const rc = this._w2c(rp.x, rp.y);
    const robot = this.robots['robot'];
    if (robot) { this.tweens.killTweensOf(robot.container); robot.container.setPosition(rc.x, rc.y); robot.homeX = rc.x; robot.homeY = rc.y; robot.doneX = rc.x; robot.doneY = rc.y; }
  }

  // Move the robot to its real physics position (drives presence, not a timer).
  _onPos(wx, wy) {
    const robot = this.robots['robot']; if (!robot) return;
    const c = this._w2c(wx, wy);
    this._clearThink('robot');
    this.tweens.killTweensOf(robot.container);
    this.tweens.add({ targets: robot.container, x: c.x, y: c.y, duration: 450, ease: 'Cubic.easeInOut', onComplete: () => this._bounce('robot') });
  }

  _drawBg(W, H) {
    const g = this.add.graphics().setDepth(0);
    const skyH = Math.floor(H * 0.17);
    // banded night-sky gradient
    const bands = 10;
    for (let i = 0; i < bands; i++) {
      g.fillStyle(this._mix(SKY_TOP, SKY_BOT, i / (bands - 1)), 1);
      g.fillRect(0, Math.floor(i * skyH / bands), W, Math.ceil(skyH / bands) + 1);
    }
    // stars
    g.fillStyle(MOON, 0.85);
    [[0.08,0.30],[0.22,0.62],[0.34,0.18],[0.46,0.50],[0.58,0.30],[0.66,0.66],
     [0.74,0.22],[0.16,0.82],[0.50,0.78],[0.30,0.42],[0.62,0.12]]
      .forEach(([sx, sy]) => g.fillRect(Math.floor(W * sx), Math.floor(skyH * sy), 2, 2));
    // crescent moon
    g.fillStyle(MOON, 1);    g.fillCircle(W * 0.87, skyH * 0.40, 15);
    g.fillStyle(SKY_TOP, 1); g.fillCircle(W * 0.84, skyH * 0.33, 13);
    // ground
    g.fillStyle(GROUND, 1); g.fillRect(0, skyH, W, H - skyH);
    g.fillStyle(HORIZON, 1); g.fillRect(0, skyH - 1, W, 3);
    // cobblestones (staggered rows)
    for (let y = skyH + 6, ri = 0; y < H; y += 14, ri++) {
      const off = (ri % 2) * 9;
      for (let x = -off; x < W; x += 18) {
        g.fillStyle(COBBLE, 1);    g.fillRoundedRect(x + 1, y + 1, 15, 11, 3);
        g.fillStyle(COBBLE_HI, 1); g.fillRoundedRect(x + 1, y + 1, 15, 4, 2);
      }
    }
  }

  // Wooden signpost for ENTRY / EXIT.
  _makeSign(x, y, label) {
    const g = this.add.graphics().setDepth(2);
    g.fillStyle(0x0a1a1f, 0.4); g.fillEllipse(x, y + 26, 26, 7);
    g.fillStyle(POLE, 1);    g.fillRect(x - 3, y - 8, 6, 34);
    g.fillStyle(WOOD_LT, 1); g.fillRect(x - 22, y - 20, 44, 16);
    g.fillStyle(WOOD_DK, 1); g.fillRect(x - 22, y - 20, 44, 2);
    this.add.text(x, y - 12, label, { fontFamily: PXH, fontSize: '6px', color: '#2a1c10' })
      .setOrigin(0.5, 0.5).setDepth(3);
  }

  // Blocky pixel merchant standing behind a counter. footY = waist baseline.
  _pixPerson(g, cx, footY, cloth) {
    const px = (x, y, w, h, col) => { g.fillStyle(col, 1); g.fillRect(Math.round(cx + x), Math.round(footY + y), w, h); };
    px(-7, -2, 14, 10, cloth);                       // torso / robe
    px(-7, -2, 14, 2, this._shade(cloth, 1.25));     // shoulder highlight
    px(-9, 0, 3, 7, cloth); px(6, 0, 3, 7, cloth);   // arms
    px(-5, -14, 10, 12, SKIN);                       // head
    px(-5, -14, 10, 3, this._shade(SKIN, 0.78));     // hair/cap
    px(-3, -9, 2, 2, 0x2a1c10); px(1, -9, 2, 2, 0x2a1c10); // eyes
  }

  // Little pixel ware (pot/jar) sitting on the counter.
  _makeWare(g, x, y, col) {
    g.fillStyle(this._shade(col, 0.7), 1); g.fillRect(x - 4, y - 7, 8, 8); // body
    g.fillStyle(col, 1);                   g.fillRect(x - 4, y - 7, 8, 3); // rim band
    g.fillStyle(this._shade(col, 1.3), 1); g.fillRect(x - 4, y - 7, 2, 8); // highlight
    g.fillStyle(this._shade(col, 0.55), 1);g.fillRect(x - 3, y - 9, 6, 2); // neck
  }

  _makeStall(cx, cy, name, sub, accent, SW, SH, AH) {
    const x0 = cx - SW / 2, y0 = cy - SH / 2;
    const g = this.add.graphics().setDepth(3);
    const counterY = y0 + SH - 22;
    // ground shadow
    g.fillStyle(0x0a1a1f, 0.45); g.fillEllipse(cx, y0 + SH + 4, SW * 0.92, 14);
    // back wall (wood planks)
    g.fillStyle(WOOD, 1);    g.fillRect(x0 + 6, y0 + AH - 2, SW - 12, SH - AH);
    g.fillStyle(WOOD_DK, 1);
    for (let py = y0 + AH + 8; py < counterY - 2; py += 12) g.fillRect(x0 + 8, py, SW - 16, 2);
    // support poles
    g.fillStyle(POLE, 1);
    g.fillRect(x0 + 4, y0 + AH, 5, SH - AH); g.fillRect(x0 + SW - 9, y0 + AH, 5, SH - AH);
    // merchant behind the counter
    this._pixPerson(g, cx, counterY - 4, accent);
    // counter table (drawn over merchant's lower body)
    g.fillStyle(WOOD_LT, 1); g.fillRect(x0 + 2, counterY, SW - 4, 12);
    g.fillStyle(this._shade(WOOD_LT, 1.2), 1); g.fillRect(x0 + 2, counterY, SW - 4, 2);
    g.fillStyle(WOOD_DK, 1); g.fillRect(x0 + 2, counterY + 12, SW - 4, 8);   // apron
    // wares on the counter
    this._makeWare(g, x0 + SW * 0.30, counterY, accent);
    this._makeWare(g, x0 + SW * 0.50, counterY, this._shade(accent, 1.3));
    this._makeWare(g, x0 + SW * 0.70, counterY, this._shade(accent, 0.7));
    // striped awning with scalloped hem
    const stripes = 8, sw = SW / stripes;
    for (let i = 0; i < stripes; i++) {
      g.fillStyle(i % 2 ? accent : CANVAS_CREAM, 1);
      g.fillRect(x0 + i * sw, y0, Math.ceil(sw) + 1, AH);
      g.fillTriangle(x0 + i * sw, y0 + AH, x0 + (i + 1) * sw, y0 + AH, x0 + i * sw + sw / 2, y0 + AH + 7);
    }
    g.fillStyle(0x2a1c10, 1); g.fillRect(x0 - 2, y0 - 3, SW + 4, 4);          // awning trim
    g.fillStyle(this._shade(accent, 1.3), 0.5); g.fillRect(x0, y0, SW, 2);     // sheen
    // name plate
    this.add.text(cx, y0 + SH + 12, name, {
      fontFamily: PX, fontSize: '15px', color: '#f0e6cf',
      align: 'center', wordWrap: { width: SW + 20 }
    }).setOrigin(0.5, 0.5).setDepth(4);
    this.add.text(cx, y0 + SH + 26, sub, {
      fontFamily: PX, fontSize: '12px', color: '#8aa0aa',
      align: 'center', wordWrap: { width: SW + 24 }
    }).setOrigin(0.5, 0).setDepth(4);
    const soldText = this.add.text(cx, cy, 'SOLD!', {
      fontFamily: PXH, fontSize: '8px', color: '#ffd166',
      backgroundColor: '#0a1a1fdd', padding: { x: 6, y: 4 }
    }).setOrigin(0.5, 0.5).setDepth(6).setVisible(false);
    return { g, soldText };
  }

  _makeRobot(x, y, label, color, tc, r) {
    const g = this.add.graphics();
    const px = (bx, by, bw, bh, col, a = 1) => { g.fillStyle(col, a); g.fillRect(bx, by, bw, bh); };
    px(-9, 8, 18, 6, 0x000000, 0);                 // (spacer)
    g.fillStyle(0x0a1a1f, 0.4); g.fillEllipse(0, 15, 26, 7); // shadow
    px(-6, 6, 4, 6, 0x2a3340); px(2, 6, 4, 6, 0x2a3340);     // legs
    px(-9, -6, 18, 13, color);                      // body
    px(-9, -6, 18, 2, 0xffffff, 0.28);              // top sheen
    px(-4, -2, 8, 6, 0x0f1f2d, 0.55);               // chest panel
    px(-7, -17, 14, 11, this._shade(color, 1.12));  // head
    px(-7, -17, 14, 2, 0xffffff, 0.25);             // head sheen
    px(-4, -13, 3, 3, 0x0f1f2d); px(1, -13, 3, 3, 0x0f1f2d); // eyes
    px(-4, -13, 3, 1, 0x7fd4ff); px(1, -13, 3, 1, 0x7fd4ff); // eye glow
    px(-1, -21, 2, 4, POLE);                        // antenna
    g.fillStyle(0xffd166, 1); g.fillCircle(0, -21, 2);
    const t = this.add.text(0, 17, label, { fontFamily: PX, fontSize: '13px', color: '#dfeaf2' }).setOrigin(0.5, 0);
    return this.add.container(x, y, [g, t]).setDepth(20);
  }

  _ensureRobot(name, phaserColor, tc) {
    if (this.robots[name]) {
      const r = this.robots[name];
      this.tweens.killTweensOf(r.container);
      this._clearThink(name);
      r.container.setPosition(r.homeX, r.homeY).setAlpha(1).setScale(1);
      return r;
    }
    // Spawn at the map centre (robot's real start); the `world` event reseats it.
    const sx = this.worldCx, sy = this.worldCy;
    const con = this._makeRobot(sx, sy, name[0].toUpperCase(), phaserColor, tc, this.ROBOT_R);
    const r = { container: con, homeX: sx, homeY: sy, doneX: sx, doneY: sy, color: phaserColor, thinkTween: null, thinkRing: null, bubble: null };
    this.robots[name] = r;
    return r;
  }

  _onReset() {
    Object.entries(this.robots).forEach(([name, r]) => { this._clearThink(name); r.container.destroy(); });
    this.robots = {};
    Object.values(this.stalls).forEach(s => { if (s.soldText) s.soldText.setVisible(false); });
  }

  handleEvent(ev) {
    const k = ev.kind;
    if      (k === 'start' || k === 'market_reset') this._onReset();
    else if (k === 'customer_start') this._ensureRobot(ev.customer, ev._pColor || 0xfbbf24, ev._tc || '#000');
    else if (k === 'world')         this._onWorld(ev.scan);
    else if (k === 'pos')           this._onPos(ev.x || 0, ev.y || 0);
    else if (k === 'visit')         this._onVisit(ev.customer, ev.stall);
    else if (k === 'llm_think')     this._onThink(ev.customer);
    else if (k === 'qr_meet')       this._onQRMeet(ev.customer, ev.stall, ev.blob || '');
    else if (k === 'a2a_call')      this._onA2ACall(ev.customer, ev.stall, ev.skill || '');
    else if (k === 'a2a_resp')      this._onA2AResp(ev.customer, ev.stall, ev.skill || '', ev.body || '', ev.ok !== false);
    else if (k === 'result')        this._onResult(ev.customer, ev.stall, ev.tx || '');
    else if (k === 'customer_done') this._onDone(ev.customer, ev.result || '');
    else if (k === 'done')          this._onAllDone();
  }

  // Movement is driven by real `pos` events now; `visit` just marks arrival —
  // pulse the stall the robot has physically reached.
  _onVisit(customer, stallName) {
    const robot = this.robots[customer]; if (!robot) return;
    this._clearThink(customer);
    this._bounce(customer);
    this._pulseStall(stallName);
  }

  // The robot meets a stall it had no prior knowledge of: the bootstrap blob it
  // received (endpoint + peer pubkey + nonce) is shown as a real, scannable QR.
  _onQRMeet(customer, stallName, blob) {
    const robot = this.robots[customer], stall = this.stalls[stallName];
    if (!stall || typeof RK === 'undefined') return;
    const qx = stall.cx, qy = stall.cy - stall.SH * 0.62;
    RK.makeQR(this, qx, qy, blob, 54, (grp) => {
      const tag = this.add.text(qx, qy + 34, 'bootstrap blob', { fontFamily: RK.PX, fontSize: '11px', color: '#7fd4ff' }).setOrigin(0.5, 0).setDepth(27).setAlpha(0);
      this.tweens.add({ targets: tag, alpha: 1, duration: 200 });
      if (robot) RK.scanBeam(this, robot.container.x, robot.container.y - 10, qx, qy);
      this.time.delayedCall(1100, () => {
        this.tweens.add({ targets: tag, alpha: 0, duration: 350, onComplete: () => tag.destroy() });
        this.tweens.add({ targets: [grp.bg, grp.img], alpha: 0, duration: 400, onComplete: () => grp.destroy() });
      });
    });
  }

  _onThink(customer) {
    const robot = this.robots[customer]; if (!robot) return;
    this._clearThink(customer);
    const ring = this.add.graphics().setDepth(18);
    ring.lineStyle(2, 0xa78bfa, 1); ring.strokeCircle(0, 0, 14);
    ring.setPosition(robot.container.x, robot.container.y);
    robot.thinkRing = ring;
    robot.thinkTween = this.tweens.add({ targets: ring, scaleX: 2.8, scaleY: 2.8, alpha: 0, duration: 900, repeat: -1, ease: 'Sine.easeOut',
      onRepeat: () => { ring.setPosition(robot.container.x, robot.container.y).setAlpha(1).setScale(1); }
    });
    const bub = this.add.text(robot.container.x, robot.container.y - 20, '· · ·', { fontSize: '15px', color: '#ffd166', fontFamily: PX }).setOrigin(0.5, 1).setDepth(25);
    robot.bubble = bub;
    this.tweens.add({ targets: bub, y: bub.y - 9, duration: 700, repeat: -1, yoyo: true, ease: 'Sine.easeInOut' });
  }

  _onResult(customer, stallName, tx) {
    this._clearThink(customer);
    if (tx.startsWith('SOLD')) this._celebrateSale(stallName);
  }

  _onDone(customer, result) {
    const robot = this.robots[customer]; if (!robot) return;
    this._clearThink(customer);
    const sold = result.startsWith('SOLD');
    this.tweens.add({ targets: robot.container, x: robot.doneX, y: robot.doneY, duration: 750, ease: 'Cubic.easeInOut',
      onComplete: () => {
        if (sold) {
          this.tweens.add({ targets: robot.container, scaleX: 1.35, scaleY: 1.35, duration: 160, yoyo: true, ease: 'Sine.easeOut', onComplete: () => robot.container.setScale(1) });
          const chk = this.add.text(robot.doneX, robot.doneY - 18, '✓', { fontSize: '18px', color: '#4ade80', fontFamily: PX }).setOrigin(0.5, 1).setDepth(30);
          this.tweens.add({ targets: chk, y: chk.y - 22, alpha: 0, duration: 1600, onComplete: () => chk.destroy() });
        } else { robot.container.setAlpha(0.4); }
      }
    });
  }

  _onAllDone() {
    const txt = this.add.text(this.W / 2, this.H / 2, 'COMPLETE!', { fontSize: '16px', color: '#ffd166', fontFamily: PXH, backgroundColor: '#0a1a1fee', padding: { x: 18, y: 12 } }).setOrigin(0.5, 0.5).setDepth(50).setAlpha(0);
    this.tweens.add({ targets: txt, alpha: 1, duration: 500, onComplete: () => this.tweens.add({ targets: txt, alpha: 0, duration: 600, delay: 3500, onComplete: () => txt.destroy() }) });
  }

  // ── Comic-style speech bubbles ──────────────────────────────────
  _showSpeech(x, y, text, bg) {
    const t = this.add.text(x, y, text, {
      fontSize: '13px', color: '#f0e6cf', fontFamily: PX,
      backgroundColor: bg || '#0a1a1fee', padding: { x: 6, y: 3 },
      wordWrap: { width: 150 },
    }).setOrigin(0.5, 1).setDepth(24).setAlpha(0);
    this.tweens.add({ targets: t, alpha: 1, duration: 160 });
    this.tweens.add({ targets: t, y: y - 14, alpha: 0, delay: 1300, duration: 500, onComplete: () => t.destroy() });
  }

  _onA2ACall(customer, stallName, skill) {
    const robot = this.robots[customer]; if (!robot) return;
    this._showSpeech(robot.container.x, robot.container.y - 22, `→ ${skill}`, '#1e3a5fee');
  }

  _onA2AResp(customer, stallName, skill, body, ok) {
    const stall = this.stalls[stallName]; if (!stall) return;
    const preview = body.length > 72 ? body.slice(0, 72) + '…' : body;
    this._showSpeech(stall.cx, stall.cy - stall.SH * 0.55, preview, ok ? '#0f2a1aee' : '#2a0f0fee');
  }

  _celebrateSale(stallName) {
    const stall = this.stalls[stallName]; if (!stall) return;
    stall.soldText.setVisible(true).setAlpha(0);
    this.tweens.add({ targets: stall.soldText, alpha: 1, duration: 280 });
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const p = this.add.graphics().setDepth(30); p.fillStyle(stall.color, 1); p.fillCircle(0, 0, 4); p.setPosition(stall.cx, stall.cy);
      this.tweens.add({ targets: p, x: stall.cx + Math.cos(angle) * 46, y: stall.cy + Math.sin(angle) * 46, scaleX: 0, scaleY: 0, alpha: 0, duration: 560, ease: 'Quad.easeOut', onComplete: () => p.destroy() });
    }
    const pop = this.add.text(stall.cx, stall.cy - stall.SH * 0.3, 'SOLD!', { fontSize: '10px', color: '#ffd166', fontFamily: PXH }).setOrigin(0.5, 1).setDepth(30);
    this.tweens.add({ targets: pop, y: pop.y - 30, alpha: 0, duration: 1400, onComplete: () => pop.destroy() });
  }

  _pulseStall(stallName) {
    const s = this.stalls[stallName]; if (!s) return;
    const hl = this.add.graphics().setDepth(5); hl.lineStyle(2.5, 0xffd166, 1); hl.strokeRect(s.cx - s.SW / 2 - 3, s.cy - s.SH / 2 - 3, s.SW + 6, s.SH + 6);
    this.tweens.add({ targets: hl, alpha: 0, duration: 1100, onComplete: () => hl.destroy() });
  }

  _bounce(customer) {
    const r = this.robots[customer]; if (!r) return;
    this.tweens.add({ targets: r.container, y: r.container.y - 8, duration: 130, yoyo: true, ease: 'Sine.easeOut' });
  }

  _clearThink(customer) {
    const r = this.robots[customer]; if (!r) return;
    if (r.thinkTween) { r.thinkTween.stop(); r.thinkTween = null; }
    if (r.thinkRing)  { r.thinkRing.destroy(); r.thinkRing = null; }
    if (r.bubble)     { r.bubble.destroy(); r.bubble = null; }
  }
}

window.addEventListener('load', () => {
  const container = document.getElementById('game-container');
  const W = Math.max(container.clientWidth || 900, 400);
  const H = Math.max(container.clientHeight || 420, 300);
  const start = () => new Phaser.Game({ type: Phaser.AUTO, parent: 'game-container', width: W, height: H,
    backgroundColor: 0x0f1f3d, scene: BazaarScene,
    scale: { mode: Phaser.Scale.NONE }, render: { antialias: false, pixelArt: true, roundPixels: true }
  });
  // Wait for the pixel fonts so Phaser's canvas text renders crisp, not fallback.
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(start); else start();
});

// ── Interactive controls ───────────────────────────────────────
async function sendRobot() {
  const name      = document.getElementById('in-name').value.trim() || 'Guest';
  const goal      = document.getElementById('in-goal').value.trim() || 'Find a Bowl for at most 15 credits';
  const askHuman  = document.getElementById('in-ask-human').checked;
  const stalls    = [...document.querySelectorAll('input[name=stall]:checked')].map(el => el.value);
  const st = document.getElementById('ctrl-status');
  st.textContent = `Dispatching ${name}…`; st.style.color = 'var(--amber)';
  try {
    const r = await fetch('/add-customer', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, goal, ask_human: askHuman, stalls })
    });
    if (r.ok) {
      st.textContent = `${name} dispatched`; st.style.color = 'var(--green)';
      setTimeout(() => { st.textContent = ''; }, 4000);
    } else {
      st.textContent = `Error: ${(await r.text()).slice(0, 60)}`; st.style.color = 'var(--red)';
    }
  } catch (e) { st.textContent = `Error: ${e.message}`; st.style.color = 'var(--red)'; }
}

async function resetMarket() {
  const STALL_PORTS = [8901, 8902, 8903, 8904, 8905, 8906];
  const st = document.getElementById('ctrl-status');
  st.textContent = 'Resetting…'; st.style.color = 'var(--amber)';
  await Promise.allSettled([
    ...STALL_PORTS.map(p => fetch(`http://localhost:${p}/reset-stock`, { method: 'POST' })),
    fetch('/reset-stock', { method: 'POST' })
  ]);
  _resetUI();
  st.textContent = 'Reset'; st.style.color = 'var(--green)';
  setTimeout(() => { st.textContent = ''; }, 2500);
}

async function answerQuestion(qid, btn) {
  const card = document.getElementById('qcard-' + qid);
  if (!card) return;
  const answer = card.querySelector('.q-input').value.trim();
  if (!answer) return;
  btn.disabled = true;
  try {
    await fetch('/answer-human', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: qid, answer })
    });
  } catch(e) { btn.disabled = false; }
}

// ── HTML helpers ───────────────────────────────────────────────
function ts() { return new Date().toTimeString().slice(0, 8); }

function _resetUI() {
  resetColors();
  document.getElementById('customers-list').innerHTML = '<span style="color:var(--muted);font-size:10px">No customers yet</span>';
  document.getElementById('activity-list').innerHTML = '<span style="color:var(--muted);font-size:10px">No calls yet</span>';
  document.getElementById('log').innerHTML = '';
  document.getElementById('questions-list').innerHTML = '';
  document.getElementById('questions-panel').style.display = 'none';
  setShoppingList([]);
}

function ensureCard(name, goal) {
  if (document.getElementById('card-' + name)) return;
  const col  = getColor(name);
  const list = document.getElementById('customers-list');
  const ph   = list.querySelector('span');
  if (ph) ph.remove();
  const card = document.createElement('div');
  card.className = 'cust-card'; card.id = 'card-' + name;
  card.innerHTML = `
    <div class="cust-avatar" style="background:${col.hex};color:${col.tc}">${name[0].toUpperCase()}</div>
    <div>
      <div class="cust-name" style="color:${col.hex}">${name}</div>
      <div class="cust-goal">${goal || ''}</div>
      <div class="cust-status idle" id="st-${name}">Dispatched…</div>
    </div>`;
  list.appendChild(card);
}

function setStatus(name, cls, text) {
  const el = document.getElementById('st-' + name); if (!el) return;
  el.className = 'cust-status ' + cls; el.textContent = text;
}

function addLog(kind, customer, body, cls) {
  const col    = customer ? getColor(customer) : null;
  const cuHtml = col ? `<span class="cu" style="color:${col.hex}">${customer}</span>` : '';
  const el = document.createElement('div'); el.className = 'll';
  el.innerHTML = `<span class="ts">${ts()}</span><span class="ev">${kind}</span>${cuHtml}<span class="${cls || ''}">${body}</span>`;
  const log = document.getElementById('log');
  log.appendChild(el); log.scrollTop = log.scrollHeight;
}

function addMsg(type, customer, stall, kind, body) {
  const feed = document.getElementById('a2a-feed');
  if (!feed) return;
  if (feed.firstElementChild && !feed.firstElementChild.classList.contains('msg')) feed.innerHTML = '';
  const col    = customer ? getColor(customer) : null;
  const cuHtml = col ? `<span class="msg-who" style="background:${col.hex};color:${col.tc}">${customer}</span>` : '';
  const el = document.createElement('div'); el.className = `msg ${type}`;
  el.innerHTML = `<div class="msg-header">${cuHtml}<span class="msg-kind">${kind}</span><span class="msg-stall">${stall}</span></div><div class="msg-body">${body}</div>`;
  feed.appendChild(el); feed.scrollTop = feed.scrollHeight;
  while (feed.children.length > 80) feed.removeChild(feed.firstChild);
}

// Shopping list — ticked off as SOLD results arrive.
let shopItems = [], shopGot = 0;
function setShoppingList(items) {
  shopItems = items || []; shopGot = 0;
  const el = document.getElementById('shop-list');
  el.innerHTML = shopItems.length
    ? shopItems.map((it, i) => `<div class="shop-item" id="shop-${i}"><span class="dot">▢</span>${it}</div>`).join('')
    : '<span style="color:var(--muted);font-size:11px">—</span>';
}
function tickShop() {
  if (shopGot >= shopItems.length) return;
  const el = document.getElementById('shop-' + shopGot);
  if (el) { el.classList.add('got'); const d = el.querySelector('.dot'); if (d) d.textContent = '☑'; }
  shopGot++;
}

function addBadge(customer, tool) {
  const list = document.getElementById('activity-list');
  if (list.querySelector('span:not(.badge)')) list.innerHTML = '';
  const el = document.createElement('span');
  const tc = tool.includes('ask_human') ? 'human' : tool.includes('query') ? 'query' : tool.includes('reserve') ? 'reserve' : 'complete';
  el.className = `badge ${tc}`;
  el.textContent = (customer ? `[${customer[0]}] ` : '') + tool;
  list.appendChild(el);
  while (list.children.length > 16) list.removeChild(list.firstChild);
}

function addQuestion(qid, customer, question) {
  const panel = document.getElementById('questions-panel');
  const list  = document.getElementById('questions-list');
  if (document.getElementById('qcard-' + qid)) return;
  panel.style.display = '';
  const col = customer ? getColor(customer) : { hex: '#fbbf24', tc: '#000' };
  const card = document.createElement('div'); card.className = 'q-card'; card.id = 'qcard-' + qid;
  card.innerHTML = `
    <span class="q-robot" style="background:${col.hex};color:${col.tc}">${customer}</span>
    <div class="q-text">${question}</div>
    <div class="q-reply">
      <input class="q-input" type="text" placeholder="Your answer…">
      <button class="btn" style="padding:3px 8px;font-size:10px" onclick="answerQuestion('${qid}', this)">Answer</button>
    </div>`;
  list.appendChild(card);
  card.querySelector('.q-input').addEventListener('keydown', e => { if (e.key === 'Enter') card.querySelector('.btn').click(); });
}

function removeQuestion(qid) {
  const card = document.getElementById('qcard-' + qid);
  if (card) card.remove();
  const list = document.getElementById('questions-list');
  if (!list.children.length) document.getElementById('questions-panel').style.display = 'none';
}

// ── Unified animation queue ────────────────────────────────────
// Events arrive in a burst from Lex. Queue them so Phaser tweens play
// sequentially and the HTML panels update in sync with the canvas.
// Snappy cadence — events are paced just enough to read, not to crawl. The
// event log (side panel) is the durable record, so on-canvas text can be brief.
const ANIM_DELAY = {
  customer_start:  250,
  world:           150,  // lay out the real map
  pos:             550,  // robot walks to the agent (~450ms tween)
  visit:           200,  // arrival pulse
  qr_meet:        1200,  // scan the bootstrap-blob QR (the "meeting")
  a2a_call:        300,  // robot speech bubble
  a2a_resp:        500,  // stall reply bubble
  llm_think:       500,
  result:          800,  // SOLD confetti
  customer_done:   900,
  done:            700,
};
const _q = [];
let _qt = null;
function _qDrain() {
  if (!_q.length) { _qt = null; return; }
  const { phaserEv, htmlFn, delay } = _q.shift();
  if (phaserEv) { if (gameScene) gameScene.handleEvent(phaserEv); else eventQueue.push(phaserEv); }
  if (htmlFn) htmlFn();
  _qt = setTimeout(_qDrain, delay ?? 0);
}
function enqueue(phaserEv, htmlFn, delay) {
  _q.push({ phaserEv, htmlFn, delay: delay ?? 0 });
  if (!_qt) _qDrain();
}
function _qClear() { _q.length = 0; if (_qt) { clearTimeout(_qt); _qt = null; } }

// ── SSE event handler ──────────────────────────────────────────
function handleEvent(ev) {
  const k = ev.kind, c = ev.customer || '', s = ev.stall || '';

  // Reset events flush any stale queued animation and apply immediately.
  if (k === 'start' || k === 'market_reset') {
    _qClear();
    _resetUI();
    if (k === 'start') {
      document.getElementById('h-meta').textContent = (ev.customers || []).join(' · ') + ` — ${ev.stalls || 6} stalls`;
      document.getElementById('h-dot').className = 'run';
      document.getElementById('h-status').textContent = 'running';
    }
    if (gameScene) gameScene.handleEvent(ev); else eventQueue.push(ev);
    return;
  }

  // Structural UI state (customer card, header indicator) — always immediate.
  if (k === 'customer_start' && c) {
    ensureCard(c, ev.goal || '');
    setStatus(c, 'shopping', ev.goal ? ev.goal.slice(0, 50) + '…' : 'shopping…');
    document.getElementById('h-dot').className = 'run';
    document.getElementById('h-status').textContent = 'running';
  }
  if (k === 'visit')         setStatus(c, 'shopping', `@ ${s}`);
  if (k === 'customer_done') { const r = ev.result || ''; setStatus(c, r.startsWith('SOLD') ? 'done-ok' : 'done-fail', r || 'No match found'); }
  if (k === 'done')          { document.getElementById('h-dot').className = 'live'; document.getElementById('h-status').textContent = 'complete'; }

  // Enrich customer_start for Phaser color.
  let phaserEv = ev;
  if (k === 'customer_start' && c) { const col = getColor(c); phaserEv = { ...ev, _pColor: col.phaser, _tc: col.tc }; }

  // Deferred HTML update — runs in sync with the animation tick.
  const htmlFn = () => {
    if      (k === 'customer_start') addLog('customer_start', c, ev.goal || '', '');
    else if (k === 'shopping_list')  { setShoppingList(ev.items || []); addLog('shopping_list', c, (ev.items||[]).join(', '), ''); }
    else if (k === 'world')          { const n = (ev.scan && ev.scan.stalls_visible || []).length; addLog('world', '', `mapped ${n} agents at real positions`, ''); }
    else if (k === 'pos')            addLog('pos', c, `→ (${(ev.x||0).toFixed?ev.x.toFixed(1):ev.x}, ${(ev.y||0).toFixed?ev.y.toFixed(1):ev.y})`, '');
    else if (k === 'visit')          { addMsg('msg-think', c, s, 'arrived', `at ${s}`); addLog('visit', c, `arrived at ${s}`, ''); }
    else if (k === 'qr_meet')        { addMsg('msg-think', c, s, '⊞ meet', `scanned <code>bootstrap blob</code> — no prior key`); addLog('qr_meet', c, `${s}: scanned bootstrap QR`, ''); }
    else if (k === 'a2a_call')       { addMsg('msg-call', c, s, (ev.skill||'') + ' →', '<code>{}</code>'); addLog('a2a_call', c, `${s} ← ${ev.skill}`, ''); }
    else if (k === 'a2a_resp')       { const b = (ev.body||'').slice(0,180); addMsg('msg-resp', c, s, '← '+(ev.skill||''), `<code>${b}</code>`); addLog('a2a_resp', c, `${s}: ${b.slice(0,80)}`, ev.ok!==false?'ok':'er'); }
    else if (k === 'llm_think')      addLog('llm_think', c, 'thinking…', '');
    else if (k === 'llm_tool')       { addBadge(c, ev.tool||''); addLog('llm_tool', c, `→ ${ev.tool||''}`, ''); }
    else if (k === 'llm_text')       { addLog('llm_text', c, (ev.text||'').slice(0,80), ''); }
    else if (k === 'result')         { const tx=ev.tx||'',sold=tx.startsWith('SOLD'); if(sold)tickShop(); addMsg(sold?'msg-result-ok':'msg-miss',c,s,'result',`<strong>${tx}</strong>`); addLog('result',c,`${s}: ${tx}`,sold?'ok':''); }
    else if (k === 'customer_done')  addLog('customer_done', c, ev.result||'no match', (ev.result||'').startsWith('SOLD')?'ok':'er');
    else if (k === 'done')           { addMsg('msg-result-ok','','','done','<strong>All done!</strong>'); addLog('done','','All customers finished','ok'); }
    else if (k === 'skill_recv')     addLog('skill_recv', '', `[${s}] ${ev.skill}`, '');
    else if (k === 'human_question') { addQuestion(ev.id,c,ev.question||''); addMsg('msg-question',c,'','❓ question',ev.question||''); addLog('human_question',c,(ev.question||'').slice(0,80),''); }
    else if (k === 'human_answered') { removeQuestion(ev.id); addLog('human_answered', c, `replied to ${ev.id}`, 'ok'); }
    else                             addLog(k, c, JSON.stringify(ev).slice(0, 100), '');
  };

  enqueue(phaserEv, htmlFn, ANIM_DELAY[k] ?? 0);
}

// ── SSE ────────────────────────────────────────────────────────
// Use a single persistent EventSource so Last-Event-ID is preserved across
// reconnects. The server sends "retry: 2000" to pace reconnect attempts.
// We never close/reopen — that would reset Last-Event-ID and replay old events.
function connect() {
  const dot = document.getElementById('h-dot'), sts = document.getElementById('h-status');
  dot.className = ''; sts.textContent = 'connecting';
  const es = new EventSource('/events');
  es.onopen    = () => { dot.className = 'live'; sts.textContent = 'connected'; };
  es.onmessage = e => { try { handleEvent(JSON.parse(e.data)); } catch(err) { console.warn('bad event', e.data, err); } };
  // The /events endpoint is a long-poll: it returns a batch then CLOSES the
  // connection, which fires onerror every cycle. That is NOT a real disconnect,
  // so we must NOT clear the animation queue here — doing so wipes the queued
  // visit/handshake tweens before they ever play. We only update the indicator.
  // Native EventSource reconnects automatically with the correct Last-Event-ID.
  es.onerror   = () => { dot.className = ''; sts.textContent = 'reconnecting…'; };
}
connect();

['in-name','in-goal'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') sendRobot(); });
});
</script>
