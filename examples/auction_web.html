<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Robot Auction</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d1117;
  --bg2:    #161b22;
  --bg3:    #1c2128;
  --border: #30363d;
  --text:   #e6edf3;
  --muted:  #8b949e;
  --purple: #a78bfa;
  --green:  #4ade80;
  --amber:  #fbbf24;
  --red:    #f87171;
  --blue:   #60a5fa;
  --gold:   #ffd700;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  height: 40px;
}
header h1 { font-size: 13px; color: var(--gold); letter-spacing: .1em; font-weight: bold; white-space: nowrap; }
#h-meta   { color: var(--muted); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#h-conn   { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); white-space: nowrap; }
#h-dot    { width: 8px; height: 8px; border-radius: 50%; background: #374151; flex-shrink: 0; }
#h-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
#h-dot.run  { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes win-flash { 0%{transform:scale(1)} 25%{transform:scale(1.08)} 50%{transform:scale(1)} 75%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes lb-slide-in { from{transform:translateX(30px);opacity:0} to{transform:translateX(0);opacity:1} }

/* ── Controls ───────────────────────────────────────────────── */
#controls {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  height: 38px;
  border-bottom: 1px solid var(--border);
}
.ctrl-row:last-child { border-bottom: none; height: 32px; }
.ctrl-lbl { font-size: 9px; color: var(--muted); white-space: nowrap; letter-spacing: .08em; }
.ctrl-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
input.ctrl-in {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 7px;
  border-radius: 4px; outline: none; flex-shrink: 0;
}
input.ctrl-in:focus { border-color: var(--gold); }
#in-name  { width: 82px; }
#in-goal  { flex: 1; min-width: 120px; }
.toggle-wrap { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }
.toggle-wrap input[type=checkbox] { accent-color: var(--gold); cursor: pointer; }
.toggle-wrap .tl { font-size: 10px; color: var(--muted); }
.toggle-wrap:hover .tl { color: var(--text); }
.btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 10px;
  border-radius: 4px; cursor: pointer; white-space: nowrap; transition: border-color .15s, color .15s; flex-shrink: 0;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-reset { color: var(--muted); }
.btn-reset:hover { border-color: var(--red); color: var(--red); }
#ctrl-status { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; }
.seller-check { display: flex; align-items: center; gap: 3px; cursor: pointer; user-select: none; }
.seller-check input { accent-color: var(--blue); cursor: pointer; }
.seller-check span { font-size: 9px; color: var(--muted); }
.seller-check:hover span { color: var(--text); }

/* ── Phaser game ──────────────────────────────────────────── */
#game-container {
  flex-shrink: 0; height: 240px; overflow: hidden;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
#game-container canvas { display: block; }

/* ── Middle (3 columns) ───────────────────────────────────── */
#middle {
  flex: 1; min-height: 0; display: grid;
  grid-template-columns: 250px 1fr 220px; background: var(--border); gap: 1px; overflow: hidden;
}

/* ── Left column ──────────────────────────────────────────── */
#left-col {
  display: flex; flex-direction: column; gap: 1px;
  background: var(--border); overflow: hidden;
}
.panel {
  background: var(--bg); padding: 8px 10px; overflow: hidden;
  display: flex; flex-direction: column; gap: 5px; min-height: 0;
}
.panel-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted);
  border-bottom: 1px solid var(--border); padding-bottom: 4px; flex-shrink: 0;
}

/* Questions panel */
#questions-panel { flex-shrink: 0; border: 1px solid var(--amber); border-radius: 4px; margin: 4px; padding: 6px 8px; background: #1a1500; display: none; }
#questions-panel .panel-title { color: var(--amber); border-color: #44370066; }
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; margin-bottom: 5px; flex-shrink: 0; }
.q-robot { font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 8px; margin-bottom: 4px; display: inline-block; }
.q-text { font-size: 10px; color: var(--text); margin-bottom: 5px; word-break: break-word; }
.q-reply { display: flex; gap: 5px; }
.q-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Courier New', monospace; font-size: 11px; padding: 3px 7px; border-radius: 4px; outline: none; }
.q-input:focus { border-color: var(--amber); }

/* Customers panel */
#customers-panel { flex: 1; min-height: 0; }
#customers-list  { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
.cust-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  padding: 5px 8px; display: grid; grid-template-columns: 24px 1fr; gap: 6px; align-items: start; flex-shrink: 0;
}
.cust-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
.cust-name   { font-size: 11px; font-weight: bold; }
.cust-goal   { font-size: 9px; color: var(--muted); }
.cust-status { font-size: 10px; margin-top: 2px; word-break: break-word; }
.cust-status.idle      { color: var(--muted); }
.cust-status.shopping  { color: var(--amber); }
.cust-status.done-ok   { color: var(--green); }
.cust-status.done-fail { color: var(--red); }

/* Activity + LLM */
#activity-panel { flex-shrink: 0; }
#activity-list  { display: flex; flex-wrap: wrap; gap: 3px; max-height: 46px; overflow: hidden; }
.badge { font-size: 9px; padding: 2px 5px; border-radius: 9px; background: var(--bg3); border: 1px solid var(--border); white-space: nowrap; }
.badge.query    { color: var(--blue);   border-color: #1e40af66; }
.badge.reserve  { color: var(--amber);  border-color: #78350f66; }
.badge.complete { color: var(--green);  border-color: #15803d66; }
.badge.human    { color: var(--amber);  border-color: #92400e66; }
#llm-panel  { flex-shrink: 0; max-height: 72px; }
#llm-text   { font-size: 10px; color: var(--muted); overflow-y: auto; max-height: 46px; word-break: break-word; }

/* ── Middle: A2A feed ─────────────────────────────────────── */
#a2a-panel {
  background: var(--bg); padding: 8px 10px;
  display: flex; flex-direction: column; gap: 5px; overflow: hidden;
}
#a2a-feed { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.msg { padding: 5px 9px; border-radius: 5px; font-size: 10px; max-width: 92%; word-break: break-word; border: 1px solid transparent; flex-shrink: 0; line-height: 1.5; }
.msg-header { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.msg-who { font-size: 8px; font-weight: bold; padding: 1px 4px; border-radius: 7px; }
.msg-kind  { font-size: 8px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.msg-stall { font-size: 9px; color: var(--purple); }
.msg-body  { color: var(--text); }
.msg-call      { background: #1a1f2e; border-color: #2d3748; align-self: flex-start; }
.msg-resp      { background: #1a2a1a; border-color: #2d4a2d; align-self: flex-end; }
.msg-result-ok { background: #1a2a1a; border-color: var(--green); }
.msg-miss      { background: #2a1a1a; border-color: #4a2d2d; }
.msg-think     { background: #1e1a2e; border-color: #3d2d5f; align-self: flex-start; }
.msg-question  { background: #1a1500; border-color: var(--amber); align-self: flex-start; }

/* ── Right: Leaderboard ───────────────────────────────────── */
#leaderboard-panel {
  background: var(--bg); padding: 8px 10px;
  display: flex; flex-direction: column; gap: 5px; overflow: hidden;
}
#leaderboard-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--gold);
  border-bottom: 1px solid #ffd70033; padding-bottom: 4px; flex-shrink: 0;
}
#leaderboard-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 4px; }
#lb-empty { color: var(--muted); font-size: 10px; text-align: center; padding: 12px 0; }
.lb-entry {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  padding: 5px 7px; flex-shrink: 0; animation: lb-slide-in 0.3s ease-out;
}
.lb-entry.win  { border-color: var(--gold); background: #1a1500; }
.lb-entry.miss { border-color: #4a2d2d; background: #1a0a0a; }
.lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.lb-name { font-size: 10px; font-weight: bold; }
.lb-badge { font-size: 8px; font-weight: bold; padding: 1px 5px; border-radius: 8px; }
.lb-badge.win  { background: var(--gold); color: #000; }
.lb-badge.miss { background: #4a2d2d; color: var(--red); }
.lb-result { font-size: 9px; color: var(--muted); word-break: break-word; }
.lb-rank { font-size: 9px; color: var(--muted); margin-bottom: 2px; }

/* ── Log ──────────────────────────────────────────────────── */
#log-section {
  flex-shrink: 0; height: 128px; background: var(--bg);
  border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
}
#log-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); padding: 4px 11px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#log     { overflow-y: auto; flex: 1; padding: 3px 11px; }
.ll      { font-size: 10px; color: var(--muted); white-space: nowrap; line-height: 1.6; }
.ll .ts  { color: #4a5568; margin-right: 7px; }
.ll .ev  { color: var(--gold); margin-right: 5px; }
.ll .cu  { font-weight: bold; margin-right: 4px; }
.ll .ok  { color: var(--green); }
.ll .er  { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>ROBOT AUCTION — Compete for limited stock!</h1>
  <span id="h-meta">ready — configure below, then send a robot</span>
  <div id="h-conn"><div id="h-dot"></div><span id="h-status">connecting</span></div>
</header>

<div id="controls">
  <!-- Row 1: robot config -->
  <div class="ctrl-row">
    <span class="ctrl-lbl">NAME</span>
    <input id="in-name" class="ctrl-in" type="text" placeholder="Alice" value="Alice">
    <span class="ctrl-lbl">GOAL</span>
    <input id="in-goal" class="ctrl-in" type="text" placeholder="Find a Bowl for at most 15 credits" value="Find a Bowl for at most 15 credits">
    <div class="ctrl-sep"></div>
    <label class="toggle-wrap">
      <input type="checkbox" id="in-ask-human">
      <span class="tl">Ask Human</span>
    </label>
    <div class="ctrl-sep"></div>
    <button class="btn" onclick="sendRobot()">↗ Send Robot</button>
    <button class="btn btn-reset" onclick="resetMarket()">⟳ Reset</button>
    <span id="ctrl-status"></span>
  </div>
  <!-- Row 2: seller selection -->
  <div class="ctrl-row">
    <span class="ctrl-lbl">SELLERS</span>
    <label class="seller-check"><input type="checkbox" name="stall" value="pottery" checked><span>Pottery :8901</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="clay"    checked><span>Clay :8904</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="textile" checked><span>Textile :8902</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="fabric"  checked><span>Fabric :8905</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="spices"  checked><span>Spices :8903</span></label>
    <label class="seller-check"><input type="checkbox" name="stall" value="herb"    checked><span>Herb :8906</span></label>
  </div>
</div>

<div id="game-container"></div>

<div id="middle">
  <div id="left-col">

    <!-- Questions from robots (shown only when pending) -->
    <div id="questions-panel">
      <div class="panel-title">⚠ Robot Questions</div>
      <div id="questions-list"></div>
    </div>

    <!-- Customers -->
    <div class="panel" id="customers-panel">
      <div class="panel-title">Bidders</div>
      <div id="customers-list">
        <span style="color:var(--muted);font-size:10px">No bidders yet</span>
      </div>
    </div>

    <div class="panel" id="activity-panel">
      <div class="panel-title">Gemini Activity</div>
      <div id="activity-list"><span style="color:var(--muted);font-size:10px">No calls yet</span></div>
    </div>
    <div class="panel" id="llm-panel">
      <div class="panel-title">LLM Reasoning</div>
      <div id="llm-text">—</div>
    </div>
  </div>

  <div id="a2a-panel">
    <div class="panel-title">A2A Messages</div>
    <div id="a2a-feed">
      <div style="color:var(--muted);font-size:11px;text-align:center;margin-top:24px">Ready — send a robot or run bazaar_rush.sh</div>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboard-panel">
    <div id="leaderboard-title">🏆 Leaderboard</div>
    <div id="leaderboard-list">
      <div id="lb-empty">No results yet</div>
    </div>
  </div>
</div>

<div id="log-section">
  <div id="log-hdr">Event Log</div>
  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script>
'use strict';

// ── Color palette ─────────────────────────────────────────────
const PALETTE = [
  { hex: '#fbbf24', phaser: 0xfbbf24, tc: '#000000' },
  { hex: '#60a5fa', phaser: 0x60a5fa, tc: '#ffffff' },
  { hex: '#4ade80', phaser: 0x4ade80, tc: '#000000' },
  { hex: '#f472b6', phaser: 0xf472b6, tc: '#000000' },
  { hex: '#fb923c', phaser: 0xfb923c, tc: '#000000' },
  { hex: '#22d3ee', phaser: 0x22d3ee, tc: '#000000' },
  { hex: '#c084fc', phaser: 0xc084fc, tc: '#000000' },
  { hex: '#f87171', phaser: 0xf87171, tc: '#ffffff' },
];
const customerColors = {};
let colorIdx = 0;

function getColor(name) {
  if (!customerColors[name]) {
    customerColors[name] = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;
  }
  return customerColors[name];
}
function resetColors() {
  Object.keys(customerColors).forEach(k => delete customerColors[k]);
  colorIdx = 0;
}

// ── Phaser scene ───────────────────────────────────────────────
let gameScene = null;
const eventQueue = [];

class AuctionScene extends Phaser.Scene {
  constructor() {
    super({ key: 'AuctionScene' });
    this.stalls = {};
    this.robots = {};
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.ROBOT_R = 12;
    this.entryX  = 32;
    this.exitX   = W - 32;
    this.LANES   = [0.22, 0.50, 0.78, 0.16, 0.38, 0.62, 0.86, 0.30];
    this.nextLane = 0;

    const SW = 155, SH = 78, AH = 17;
    const col = [W * 0.22, W * 0.50, W * 0.78];
    const row = [H * 0.28, H * 0.74];

    const STALL_DEFS = [
      { name: 'Pottery Palace',  col: 0, row: 0, color: 0xc2410c, sub: 'Bowl 8 · Vase 12 · Teapot 22' },
      { name: 'Clay Corner',     col: 1, row: 0, color: 0xb45309, sub: 'Bowl 10 · Jug 7' },
      { name: 'Textile Traders', col: 2, row: 0, color: 0x6d28d9, sub: 'Scarf 15 · Tablecloth 30' },
      { name: 'Spice Garden',    col: 0, row: 1, color: 0x15803d, sub: 'Saffron 5 · Vanilla 9 · Anise 4' },
      { name: 'Fabric House',    col: 1, row: 1, color: 0x4338ca, sub: 'Scarf 12 · Ribbon 8' },
      { name: 'Herb Garden',     col: 2, row: 1, color: 0x065f46, sub: 'Saffron 6 · Lavender 3' },
    ];

    this._drawBg(W, H);

    const lane = this.add.graphics().setDepth(1);
    lane.lineStyle(1, 0x21262d, 1);
    const midY = (row[0] + row[1]) / 2;
    lane.moveTo(this.entryX + 20, midY); lane.lineTo(this.exitX - 20, midY);
    lane.moveTo(this.entryX, row[0]);    lane.lineTo(this.entryX, row[1]);
    lane.strokePath();
    this.add.text(this.entryX, 5, 'ENTRY', { fontSize: '8px', color: '#374151', fontFamily: 'Courier New' }).setOrigin(0.5, 0).setDepth(2);
    this.add.text(this.exitX,  5, 'EXIT',  { fontSize: '8px', color: '#374151', fontFamily: 'Courier New' }).setOrigin(0.5, 0).setDepth(2);

    // Gold bid banner
    this.add.text(W/2, 8, '★ COMPETE FOR LIMITED STOCK — FASTEST ROBOT WINS ★', {
      fontSize: '8px', color: '#ffd700', fontFamily: 'Courier New', letterSpacing: 1
    }).setOrigin(0.5, 0).setDepth(2);

    STALL_DEFS.forEach(def => {
      const cx = col[def.col], cy = row[def.row];
      this.stalls[def.name] = { cx, cy, color: def.color, SW, SH,
        ...this._makeStall(cx, cy, def.name, def.sub, def.color, SW, SH, AH) };
    });

    gameScene = this;
    while (eventQueue.length) this.handleEvent(eventQueue.shift());
  }

  _drawBg(W, H) {
    const g = this.add.graphics().setDepth(0);
    g.fillStyle(0x0d1117, 1); g.fillRect(0, 0, W, H);
    g.lineStyle(1, 0x161b22, 1);
    for (let x = 0; x < W; x += 40) { g.moveTo(x, 0); g.lineTo(x, H); }
    for (let y = 0; y < H; y += 40) { g.moveTo(0, y); g.lineTo(W, y); }
    g.strokePath();
    g.lineStyle(1, 0x30363d, 1); g.strokeRect(0, 0, W, H);
    // Gold border
    g.lineStyle(1, 0xffd70033, 1); g.strokeRect(2, 2, W-4, H-4);
  }

  _makeStall(cx, cy, name, sub, color, SW, SH, AH) {
    const x0 = cx - SW / 2, y0 = cy - SH / 2;
    const g = this.add.graphics().setDepth(3);
    g.fillStyle(0x000000, 0.25); g.fillRoundedRect(x0 + 3, y0 + 3, SW, SH, 7);
    g.fillStyle(0x1c2128, 1);    g.fillRoundedRect(x0, y0, SW, SH, 7);
    g.fillStyle(color, 0.95);    g.fillRect(x0, y0, SW, AH);
    g.fillStyle(0x1c2128, 1);    g.fillRect(x0, y0, 7, 7); g.fillRect(x0 + SW - 7, y0, 7, 7);
    g.fillStyle(color, 0.95);    g.fillRoundedRect(x0, y0, SW, AH, { tl: 7, tr: 7, bl: 0, br: 0 });
    g.lineStyle(1.5, color, 0.45); g.strokeRoundedRect(x0, y0, SW, SH, 7);
    this.add.text(cx, y0 + AH + 12, name, {
      fontSize: '9px', color: '#e6edf3', fontFamily: 'Courier New', fontStyle: 'bold',
      align: 'center', wordWrap: { width: SW - 10 }
    }).setOrigin(0.5, 0.5).setDepth(4);
    this.add.text(cx, y0 + AH + 36, sub, {
      fontSize: '7px', color: '#6b7280', fontFamily: 'Courier New',
      align: 'center', wordWrap: { width: SW - 12 }
    }).setOrigin(0.5, 0.5).setDepth(4);
    const soldText = this.add.text(cx, cy + 6, 'SOLD OUT', {
      fontSize: '10px', color: '#4ade80', fontFamily: 'Courier New', fontStyle: 'bold',
      backgroundColor: '#0d1117dd', padding: { x: 6, y: 3 }
    }).setOrigin(0.5, 0.5).setDepth(6).setVisible(false);
    return { g, soldText };
  }

  _makeRobot(x, y, label, color, tc, r) {
    const g = this.add.graphics();
    g.fillStyle(0x000000, 0.25); g.fillEllipse(1, r + 3, r * 1.6, r * 0.5);
    g.fillStyle(color, 1);       g.fillCircle(0, 0, r);
    g.fillStyle(0xffffff, 0.18); g.fillCircle(-r * 0.28, -r * 0.32, r * 0.38);
    // Gold crown ring for auction
    const ring = this.add.graphics();
    ring.lineStyle(1, 0xffd700, 0.5); ring.strokeCircle(0, 0, r + 3);
    const t = this.add.text(0, 0, label, { fontSize: '9px', color: tc, fontFamily: 'Courier New', fontStyle: 'bold' }).setOrigin(0.5, 0.5);
    return this.add.container(x, y, [g, ring, t]).setDepth(20);
  }

  _ensureRobot(name, phaserColor, tc) {
    if (this.robots[name]) {
      const r = this.robots[name];
      this.tweens.killTweensOf(r.container);
      this._clearThink(name);
      r.container.setPosition(r.homeX, r.homeY).setAlpha(1).setScale(1);
      return r;
    }
    const laneY = this.H * this.LANES[this.nextLane % this.LANES.length];
    this.nextLane++;
    const con = this._makeRobot(this.entryX, laneY, name[0].toUpperCase(), phaserColor, tc, this.ROBOT_R);
    const r = { container: con, homeX: this.entryX, homeY: laneY, doneX: this.exitX, doneY: laneY, color: phaserColor, thinkTween: null, thinkRing: null, bubble: null };
    this.robots[name] = r;
    return r;
  }

  _onReset() {
    Object.entries(this.robots).forEach(([name, r]) => { this._clearThink(name); r.container.destroy(); });
    this.robots = {}; this.nextLane = 0;
    Object.values(this.stalls).forEach(s => s.soldText.setVisible(false));
  }

  handleEvent(ev) {
    const k = ev.kind;
    if      (k === 'start' || k === 'market_reset') this._onReset();
    else if (k === 'customer_start') this._ensureRobot(ev.customer, ev._pColor || 0xfbbf24, ev._tc || '#000');
    else if (k === 'visit')         this._onVisit(ev.customer, ev.stall);
    else if (k === 'llm_think')     this._onThink(ev.customer);
    else if (k === 'result')        this._onResult(ev.customer, ev.stall, ev.tx || '');
    else if (k === 'customer_done') this._onDone(ev.customer, ev.result || '');
    else if (k === 'done')          this._onAllDone();
  }

  _onVisit(customer, stallName) {
    const robot = this.robots[customer], stall = this.stalls[stallName];
    if (!robot || !stall) return;
    this._clearThink(customer);
    const targetX = stall.cx, targetY = stall.cy + stall.SH * 0.38;
    this.tweens.chain({ targets: robot.container, tweens: [
      { x: robot.homeX, y: targetY, duration: 350, ease: 'Sine.easeInOut' },
      { x: targetX,     y: targetY, duration: 550, ease: 'Cubic.easeInOut', onComplete: () => { this._bounce(customer); this._pulseStall(stallName); } },
    ]});
  }

  _onThink(customer) {
    const robot = this.robots[customer]; if (!robot) return;
    this._clearThink(customer);
    const ring = this.add.graphics().setDepth(18);
    ring.lineStyle(2, 0xffd700, 1); ring.strokeCircle(0, 0, 14);
    ring.setPosition(robot.container.x, robot.container.y);
    robot.thinkRing = ring;
    robot.thinkTween = this.tweens.add({ targets: ring, scaleX: 2.8, scaleY: 2.8, alpha: 0, duration: 900, repeat: -1, ease: 'Sine.easeOut',
      onRepeat: () => { ring.setPosition(robot.container.x, robot.container.y).setAlpha(1).setScale(1); }
    });
    const bub = this.add.text(robot.container.x, robot.container.y - 20, '· · ·', { fontSize: '9px', color: '#ffd700', fontFamily: 'Courier New' }).setOrigin(0.5, 1).setDepth(25);
    robot.bubble = bub;
    this.tweens.add({ targets: bub, y: bub.y - 9, duration: 700, repeat: -1, yoyo: true, ease: 'Sine.easeInOut' });
  }

  _onResult(customer, stallName, tx) {
    this._clearThink(customer);
    if (tx.startsWith('SOLD')) this._celebrateSale(stallName, customer);
  }

  _onDone(customer, result) {
    const robot = this.robots[customer]; if (!robot) return;
    this._clearThink(customer);
    const sold = result.startsWith('SOLD');
    this.tweens.add({ targets: robot.container, x: robot.doneX, y: robot.doneY, duration: 750, ease: 'Cubic.easeInOut',
      onComplete: () => {
        if (sold) {
          // Win animation — bigger bounce + gold flash
          this.tweens.add({ targets: robot.container, scaleX: 1.5, scaleY: 1.5, duration: 200, yoyo: true, ease: 'Sine.easeOut',
            onComplete: () => {
              this.tweens.add({ targets: robot.container, scaleX: 1.2, scaleY: 1.2, duration: 150, yoyo: true, ease: 'Sine.easeOut', onComplete: () => robot.container.setScale(1) });
            }
          });
          // Gold confetti
          for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const p = this.add.graphics().setDepth(32); p.fillStyle(0xffd700, 1); p.fillCircle(0, 0, 4); p.setPosition(robot.doneX, robot.doneY);
            this.tweens.add({ targets: p, x: robot.doneX + Math.cos(angle) * 55, y: robot.doneY + Math.sin(angle) * 55, scaleX: 0, scaleY: 0, alpha: 0, duration: 700, ease: 'Quad.easeOut', onComplete: () => p.destroy() });
          }
          const chk = this.add.text(robot.doneX, robot.doneY - 22, '★ WON ★', { fontSize: '12px', color: '#ffd700', fontFamily: 'Courier New', fontStyle: 'bold' }).setOrigin(0.5, 1).setDepth(33);
          this.tweens.add({ targets: chk, y: chk.y - 28, alpha: 0, duration: 2000, onComplete: () => chk.destroy() });
        } else {
          robot.container.setAlpha(0.4);
        }
      }
    });
  }

  _onAllDone() {
    const txt = this.add.text(this.W / 2, this.H / 2, 'AUCTION COMPLETE!', { fontSize: '16px', color: '#ffd700', fontFamily: 'Courier New', fontStyle: 'bold', backgroundColor: '#0d1117ee', padding: { x: 18, y: 9 } }).setOrigin(0.5, 0.5).setDepth(50).setAlpha(0);
    this.tweens.add({ targets: txt, alpha: 1, duration: 500, onComplete: () => this.tweens.add({ targets: txt, alpha: 0, duration: 600, delay: 3500, onComplete: () => txt.destroy() }) });
  }

  _celebrateSale(stallName, customer) {
    const stall = this.stalls[stallName]; if (!stall) return;
    stall.soldText.setVisible(true).setAlpha(0);
    this.tweens.add({ targets: stall.soldText, alpha: 1, duration: 280 });
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2;
      const p = this.add.graphics().setDepth(30); p.fillStyle(0xffd700, 1); p.fillCircle(0, 0, 4); p.setPosition(stall.cx, stall.cy);
      this.tweens.add({ targets: p, x: stall.cx + Math.cos(angle) * 52, y: stall.cy + Math.sin(angle) * 52, scaleX: 0, scaleY: 0, alpha: 0, duration: 620, ease: 'Quad.easeOut', onComplete: () => p.destroy() });
    }
    const pop = this.add.text(stall.cx, stall.cy - stall.SH * 0.3, '★ SOLD! ★', { fontSize: '12px', color: '#ffd700', fontFamily: 'Courier New', fontStyle: 'bold' }).setOrigin(0.5, 1).setDepth(30);
    this.tweens.add({ targets: pop, y: pop.y - 30, alpha: 0, duration: 1600, onComplete: () => pop.destroy() });
  }

  _pulseStall(stallName) {
    const s = this.stalls[stallName]; if (!s) return;
    const hl = this.add.graphics().setDepth(5); hl.lineStyle(2.5, 0xffd700, 1); hl.strokeRoundedRect(s.cx - s.SW / 2, s.cy - s.SH / 2, s.SW, s.SH, 7);
    this.tweens.add({ targets: hl, alpha: 0, duration: 1100, onComplete: () => hl.destroy() });
  }

  _bounce(customer) {
    const r = this.robots[customer]; if (!r) return;
    this.tweens.add({ targets: r.container, y: r.container.y - 8, duration: 130, yoyo: true, ease: 'Sine.easeOut' });
  }

  _clearThink(customer) {
    const r = this.robots[customer]; if (!r) return;
    if (r.thinkTween) { r.thinkTween.stop(); r.thinkTween = null; }
    if (r.thinkRing)  { r.thinkRing.destroy(); r.thinkRing = null; }
    if (r.bubble)     { r.bubble.destroy(); r.bubble = null; }
  }
}

// ── Interactive controls ───────────────────────────────────────
async function sendRobot() {
  const name      = document.getElementById('in-name').value.trim() || 'Guest';
  const goal      = document.getElementById('in-goal').value.trim() || 'Find a Bowl for at most 15 credits';
  const askHuman  = document.getElementById('in-ask-human').checked;
  const stalls    = [...document.querySelectorAll('input[name=stall]:checked')].map(el => el.value);
  const st = document.getElementById('ctrl-status');
  st.textContent = `Dispatching ${name}…`; st.style.color = 'var(--amber)';
  try {
    const r = await fetch('/add-customer', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, goal, ask_human: askHuman, stalls })
    });
    if (r.ok) {
      st.textContent = `${name} dispatched`; st.style.color = 'var(--green)';
      setTimeout(() => { st.textContent = ''; }, 4000);
    } else {
      st.textContent = `Error: ${(await r.text()).slice(0, 60)}`; st.style.color = 'var(--red)';
    }
  } catch (e) { st.textContent = `Error: ${e.message}`; st.style.color = 'var(--red)'; }
}

async function resetMarket() {
  const STALL_PORTS = [8901, 8902, 8903, 8904, 8905, 8906];
  const st = document.getElementById('ctrl-status');
  st.textContent = 'Resetting…'; st.style.color = 'var(--amber)';
  await Promise.allSettled([
    ...STALL_PORTS.map(p => fetch(`http://localhost:${p}/reset-stock`, { method: 'POST' })),
    fetch('/reset-stock', { method: 'POST' })
  ]);
  _resetUI();
  st.textContent = 'Reset'; st.style.color = 'var(--green)';
  setTimeout(() => { st.textContent = ''; }, 2500);
}

async function answerQuestion(qid, btn) {
  const card = document.getElementById('qcard-' + qid);
  if (!card) return;
  const answer = card.querySelector('.q-input').value.trim();
  if (!answer) return;
  btn.disabled = true;
  try {
    await fetch('/answer-human', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: qid, answer })
    });
  } catch(e) { btn.disabled = false; }
}

// ── HTML helpers ───────────────────────────────────────────────
function ts() { return new Date().toTimeString().slice(0, 8); }

let leaderboardEntries = [];

function _resetUI() {
  resetColors();
  leaderboardEntries = [];
  document.getElementById('customers-list').innerHTML = '<span style="color:var(--muted);font-size:10px">No bidders yet</span>';
  document.getElementById('a2a-feed').innerHTML = '<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:24px">Reset — ready!</div>';
  document.getElementById('activity-list').innerHTML = '<span style="color:var(--muted);font-size:10px">No calls yet</span>';
  document.getElementById('llm-text').textContent = '—';
  document.getElementById('log').innerHTML = '';
  document.getElementById('questions-list').innerHTML = '';
  document.getElementById('questions-panel').style.display = 'none';
  document.getElementById('leaderboard-list').innerHTML = '<div id="lb-empty">No results yet</div>';
}

function addLeaderboardEntry(name, result) {
  const list = document.getElementById('leaderboard-list');
  const empty = document.getElementById('lb-empty');
  if (empty) empty.remove();

  leaderboardEntries.push({ name, result, ts: ts() });
  const rank = leaderboardEntries.length;
  const isSold = result.startsWith('SOLD');
  const col = getColor(name);

  const entry = document.createElement('div');
  entry.className = 'lb-entry ' + (isSold ? 'win' : 'miss');
  entry.id = 'lb-' + name;
  entry.innerHTML = `
    <div class="lb-rank">#${rank}</div>
    <div class="lb-header">
      <span class="lb-name" style="color:${col.hex}">${name}</span>
      <span class="lb-badge ${isSold ? 'win' : 'miss'}">${isSold ? 'WIN' : 'MISS'}</span>
    </div>
    <div class="lb-result">${result || 'No match'}</div>`;

  if (isSold) {
    entry.style.animation = 'win-flash 0.6s ease-out, lb-slide-in 0.3s ease-out';
  }

  list.appendChild(entry); list.scrollTop = list.scrollHeight;
}

function ensureCard(name, goal) {
  if (document.getElementById('card-' + name)) return;
  const col  = getColor(name);
  const list = document.getElementById('customers-list');
  const ph   = list.querySelector('span');
  if (ph) ph.remove();
  const card = document.createElement('div');
  card.className = 'cust-card'; card.id = 'card-' + name;
  card.innerHTML = `
    <div class="cust-avatar" style="background:${col.hex};color:${col.tc}">${name[0].toUpperCase()}</div>
    <div>
      <div class="cust-name" style="color:${col.hex}">${name}</div>
      <div class="cust-goal">${goal || ''}</div>
      <div class="cust-status idle" id="st-${name}">Dispatched…</div>
    </div>`;
  list.appendChild(card);
}

function setStatus(name, cls, text) {
  const el = document.getElementById('st-' + name); if (!el) return;
  el.className = 'cust-status ' + cls; el.textContent = text;
}

function addLog(kind, customer, body, cls) {
  const col    = customer ? getColor(customer) : null;
  const cuHtml = col ? `<span class="cu" style="color:${col.hex}">${customer}</span>` : '';
  const el = document.createElement('div'); el.className = 'll';
  el.innerHTML = `<span class="ts">${ts()}</span><span class="ev">${kind}</span>${cuHtml}<span class="${cls || ''}">${body}</span>`;
  const log = document.getElementById('log');
  log.appendChild(el); log.scrollTop = log.scrollHeight;
}

function addMsg(type, customer, stall, kind, body) {
  const feed = document.getElementById('a2a-feed');
  if (feed.firstElementChild && !feed.firstElementChild.classList.contains('msg')) feed.innerHTML = '';
  const col    = customer ? getColor(customer) : null;
  const cuHtml = col ? `<span class="msg-who" style="background:${col.hex};color:${col.tc}">${customer}</span>` : '';
  const el = document.createElement('div'); el.className = `msg ${type}`;
  el.innerHTML = `<div class="msg-header">${cuHtml}<span class="msg-kind">${kind}</span><span class="msg-stall">${stall}</span></div><div class="msg-body">${body}</div>`;
  feed.appendChild(el); feed.scrollTop = feed.scrollHeight;
  while (feed.children.length > 80) feed.removeChild(feed.firstChild);
}

function addBadge(customer, tool) {
  const list = document.getElementById('activity-list');
  if (list.querySelector('span:not(.badge)')) list.innerHTML = '';
  const el = document.createElement('span');
  const tc = tool.includes('ask_human') ? 'human' : tool.includes('query') ? 'query' : tool.includes('reserve') ? 'reserve' : 'complete';
  el.className = `badge ${tc}`;
  el.textContent = (customer ? `[${customer[0]}] ` : '') + tool;
  list.appendChild(el);
  while (list.children.length > 16) list.removeChild(list.firstChild);
}

function addQuestion(qid, customer, question) {
  const panel = document.getElementById('questions-panel');
  const list  = document.getElementById('questions-list');
  if (document.getElementById('qcard-' + qid)) return;
  panel.style.display = '';
  const col = customer ? getColor(customer) : { hex: '#fbbf24', tc: '#000' };
  const card = document.createElement('div'); card.className = 'q-card'; card.id = 'qcard-' + qid;
  card.innerHTML = `
    <span class="q-robot" style="background:${col.hex};color:${col.tc}">${customer}</span>
    <div class="q-text">${question}</div>
    <div class="q-reply">
      <input class="q-input" type="text" placeholder="Your answer…">
      <button class="btn" style="padding:3px 8px;font-size:10px" onclick="answerQuestion('${qid}', this)">Answer</button>
    </div>`;
  list.appendChild(card);
  card.querySelector('.q-input').addEventListener('keydown', e => { if (e.key === 'Enter') card.querySelector('.btn').click(); });
}

function removeQuestion(qid) {
  const card = document.getElementById('qcard-' + qid);
  if (card) card.remove();
  const list = document.getElementById('questions-list');
  if (!list.children.length) document.getElementById('questions-panel').style.display = 'none';
}

// ── SSE event handler ──────────────────────────────────────────
function handleEvent(ev) {
  const k = ev.kind, c = ev.customer || '', s = ev.stall || '';

  let sceneEv = ev;
  if (k === 'customer_start' && c) {
    const col = getColor(c);
    sceneEv = { ...ev, _pColor: col.phaser, _tc: col.tc };
  }
  if (gameScene) gameScene.handleEvent(sceneEv);
  else           eventQueue.push(sceneEv);

  if (k === 'start') {
    _resetUI();
    document.getElementById('h-meta').textContent = (ev.customers || []).join(' · ') + ` — ${ev.stalls || 6} stalls — AUCTION OPEN!`;
    document.getElementById('h-dot').className = 'run';
    document.getElementById('h-status').textContent = 'running';
    addLog('start', '', 'Auction started', '');
    return;
  }
  if (k === 'market_reset') {
    _resetUI();
    addLog('market_reset', '', 'Market reset', '');
    return;
  }
  if (k === 'customer_start') {
    ensureCard(c, ev.goal || '');
    setStatus(c, 'shopping', ev.goal ? ev.goal.slice(0, 50) + '…' : 'shopping…');
    document.getElementById('h-dot').className = 'run';
    document.getElementById('h-status').textContent = 'running';
    addLog('customer_start', c, ev.goal || '', '');
    return;
  }
  if (k === 'human_question') {
    addQuestion(ev.id, c, ev.question || '');
    addMsg('msg-question', c, '', '❓ question', ev.question || '');
    addLog('human_question', c, (ev.question || '').slice(0, 80), '');
    return;
  }
  if (k === 'human_answered') {
    removeQuestion(ev.id);
    addLog('human_answered', c, `replied to ${ev.id}`, 'ok');
    return;
  }
  if (k === 'visit') {
    setStatus(c, 'shopping', `@ ${s}`);
    addMsg('msg-think', c, s, 'visit', `→ ${s}`);
    addLog('visit', c, `→ ${s}`, '');
    return;
  }
  if (k === 'llm_think') { addLog('llm_think', c, `reasoning at ${s}`, ''); return; }
  if (k === 'a2a_call') {
    const a = ev.args ? JSON.stringify(ev.args) : '{}';
    addMsg('msg-call', c, s, ev.skill + ' →', `<code>${a}</code>`);
    addLog('a2a_call', c, `${s} ← ${ev.skill}`, '');
    return;
  }
  if (k === 'a2a_resp') {
    const body = (ev.body || '').slice(0, 180);
    addMsg('msg-resp', c, s, '← ' + ev.skill, `<code>${body}</code>`);
    addLog('a2a_resp', c, `${s} → ${ev.skill}: ${body.slice(0,80)}`, ev.ok !== false ? 'ok' : 'er');
    return;
  }
  if (k === 'skill_recv') { addLog('skill_recv', '', `[${s}] ${ev.skill}`, ''); return; }
  if (k === 'llm_tool') {
    addBadge(c, ev.tool);
    addLog('llm_tool', c, `${s} → ${ev.tool}`, '');
    return;
  }
  if (k === 'llm_text') {
    const t = ev.text || '';
    document.getElementById('llm-text').textContent = t.slice(0, 300) || '—';
    addLog('llm_text', c, `${s}: ${t.slice(0,60)}`, '');
    return;
  }
  if (k === 'result') {
    const tx = ev.tx || '', sold = tx.startsWith('SOLD');
    addMsg(sold ? 'msg-result-ok' : 'msg-miss', c, s, 'result', `<strong>${tx}</strong>`);
    addLog('result', c, `${s}: ${tx}`, sold ? 'ok' : '');
    return;
  }
  if (k === 'customer_done') {
    const r = ev.result || '', sold = r.startsWith('SOLD');
    setStatus(c, sold ? 'done-ok' : 'done-fail', sold ? r : (r || 'No match found'));
    // Add to leaderboard
    addLeaderboardEntry(c, r);
    addLog('customer_done', c, r || 'no match', sold ? 'ok' : 'er');
    return;
  }
  if (k === 'done') {
    document.getElementById('h-dot').className = 'live';
    document.getElementById('h-status').textContent = 'complete';
    addMsg('msg-result-ok', '', '', 'done', '<strong>Auction closed!</strong>');
    addLog('done', '', 'Auction complete', 'ok');
    return;
  }
  addLog(k, c, JSON.stringify(ev).slice(0, 100), '');
}

// ── SSE ────────────────────────────────────────────────────────
function connect() {
  const dot = document.getElementById('h-dot'), sts = document.getElementById('h-status');
  dot.className = ''; sts.textContent = 'connecting';
  const es = new EventSource('/events');
  es.onopen = () => { dot.className = 'live'; sts.textContent = 'connected'; };
  es.onmessage = e => { try { handleEvent(JSON.parse(e.data)); } catch(err) { console.warn('bad event', e.data, err); } };
  es.onerror = () => { dot.className = ''; sts.textContent = 'reconnecting…'; es.close(); setTimeout(connect, 2000); };
}
connect();

['in-name','in-goal'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') sendRobot(); });
});
